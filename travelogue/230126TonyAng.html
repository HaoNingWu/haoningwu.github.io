<div class="meta">
吴浩宁<br>
悉尼 · 2023年1月26日
</div>

<p>
在澳洲海事博物馆的一角，有一块很容易被忽略的展板。我最初只是路过，但上面的一张黑白照片让我停了下来。主人公叫Tony Ang，是一位年轻的水手。他的船在二战中被鱼雷击中，而他本人于1942年3月，也就是日军偷袭珍珠港三个月后，到达了西澳的珀斯。彼时大约有2000名华人在经历相似的遭遇后来到了澳大利亚，在“白澳”（White Australia）政策下，他们以临时难民的身份才得以留在澳洲。
</p>
